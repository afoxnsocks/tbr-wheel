<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TBR Wheel</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Wheel + animation libraries -->
  <script src="Winwheel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <style>
    :root {
      --pink: #ff92b2;
      --pink-dark: #f46f99;
      --text: #5f4a57;
      --purple: #8f5bc7;
      --panel: rgba(255, 255, 255, 0.78);
      --panel-strong: rgba(255, 255, 255, 0.92);
      --line: rgba(180, 120, 160, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: "Inter", sans-serif;
      text-align: center;
      color: var(--text);
      min-height: 100vh;
      margin: 0;
      padding: 20px 16px 40px;
      background:
        linear-gradient(rgba(255, 242, 248, 0.76), rgba(255, 242, 248, 0.76)),
        url("background.png") no-repeat center center fixed;
      background-size: cover;
    }

    h1 {
      font-family: "Cormorant Garamond", serif;
      font-weight: 700;
      margin: 12px 0 16px;
      color: #6f3f71;
      font-size: clamp(2.4rem, 5vw, 4rem);
      letter-spacing: 0.02em;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.65);
    }

    .subtitle {
      font-family: "Cormorant Garamond", serif;
      font-size: 1.15rem;
      color: #7d577f;
      margin-top: -10px;
      margin-bottom: 18px;
    }

    .controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    input {
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255, 160, 190, 0.55);
      width: min(420px, 88vw);
      outline: none;
      background: rgba(255, 255, 255, 0.9);
      font-size: 16px;
      font-family: "Inter", sans-serif;
      box-shadow: 0 8px 22px rgba(120, 70, 90, 0.06);
    }

    button {
      padding: 12px 16px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #ff9fbc, #c8a3ff);
      color: white;
      cursor: pointer;
      transition: 0.2s ease;
      box-shadow: 0 10px 18px rgba(170, 120, 170, 0.2);
      font-size: 16px;
      font-weight: 600;
      min-height: 44px;
      font-family: "Inter", sans-serif;
    }

    button:hover {
      background: linear-gradient(135deg, var(--pink-dark), #b28cff);
      transform: translateY(-1px);
    }

    .wheel-wrap {
      position: relative;
      display: inline-block;
      margin-top: 10px;
      padding-top: 24px;
    }

    .pointer {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 16px solid transparent;
      border-right: 16px solid transparent;
      border-bottom: 26px solid #8454b8;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.18));
      z-index: 5;
    }

    canvas {
      display: block;
      margin: 0 auto;
      border-radius: 50%;
      box-shadow:
        0 0 18px rgba(255, 182, 193, 0.55),
        0 0 40px rgba(177, 156, 255, 0.28);
      background: rgba(255, 255, 255, 0.16);
      touch-action: manipulation;
      max-width: 90vw;
      height: auto;
    }

    #result {
      margin-top: 18px;
      color: #7b2cbf;
      font-size: 1.15rem;
      font-weight: 700;
      min-height: 1.4em;
      font-family: "Inter", sans-serif;
    }

    .history {
      width: min(560px, 92vw);
      margin: 24px auto 0;
      padding: 18px 18px 16px;
      border-radius: 20px;
      background: var(--panel);
      backdrop-filter: blur(8px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
      text-align: left;
      border: 1px solid var(--line);
    }

    .history h3 {
      margin: 0 0 10px;
      font-family: "Cormorant Garamond", serif;
      color: #6f3f71;
      font-size: 1.5rem;
      letter-spacing: 0.02em;
    }

    .history-list {
      margin: 0;
      padding-left: 22px;
      max-height: 180px;
      overflow: auto;
      list-style: none;
    }

    .history-list li {
      position: relative;
      margin: 8px 0;
      padding-left: 18px;
      word-break: break-word;
      line-height: 1.35;
    }

    .history-list li::before {
      content: "✿";
      position: absolute;
      left: 0;
      top: 0;
      color: #d77cb2;
      font-size: 0.95rem;
    }

    /* Winner popup */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(92, 66, 83, 0.48);
      align-items: center;
      justify-content: center;
      z-index: 999999;
      padding: 20px;
    }

    .modal {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 24px;
      padding: 28px 24px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.22);
      border: 2px solid rgba(232, 181, 211, 0.55);
      backdrop-filter: blur(8px);
      position: relative;
    }

    .modal h2 {
      margin-top: 0;
      font-family: "Cormorant Garamond", serif;
      color: #7d49c4;
      font-size: 2.1rem;
      margin-bottom: 8px;
    }

    .winner-book {
      font-family: "Cormorant Garamond", serif;
      font-size: 1.7rem;
      font-weight: 700;
      margin: 14px 0 18px;
      color: #6f3f71;
      word-break: break-word;
    }

    .modal button {
      background: linear-gradient(135deg, #ff94b6, #c0a0ff);
    }

    .modal button:hover {
      background: linear-gradient(135deg, #f56f9a, #a98bff);
    }

    /* Sparkles */
    .sparkle {
      position: fixed;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 1000000;
      background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,194,221,0.95) 35%, rgba(202,170,255,0.92) 70%, rgba(255,255,255,0) 100%);
      animation: sparkle-float 900ms ease-out forwards;
      filter: blur(0.2px);
    }

    @keyframes sparkle-float {
      0% {
        transform: translate(0, 0) scale(0.4);
        opacity: 1;
      }
      100% {
        transform: translate(var(--dx), var(--dy)) scale(1.4);
        opacity: 0;
      }
    }

    /* Sakura petals */
    .petal {
      position: fixed;
      pointer-events: none;
      z-index: 1;
      opacity: 0.55;
      color: rgba(224, 132, 182, 0.7);
      font-size: 18px;
      animation: drift 12s linear infinite;
      user-select: none;
    }

    @keyframes drift {
      from {
        transform: translateY(-10vh) rotate(0deg);
      }
      to {
        transform: translateY(110vh) rotate(220deg);
      }
    }

    .decor-top, .decor-bottom {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin: 8px 0 2px;
      color: rgba(219, 120, 176, 0.55);
      font-size: 0.9rem;
      user-select: none;
    }

    @media (max-width: 640px) {
      body {
        padding: 14px 10px 34px;
        background-attachment: scroll;
      }

      .controls {
        gap: 10px;
      }

      input {
        width: 100%;
        max-width: 520px;
      }

      .wheel-wrap {
        width: min(88vw, 340px);
      }

      canvas {
        width: min(88vw, 340px) !important;
        height: min(88vw, 340px) !important;
      }

      .history {
        text-align: left;
      }
    }
  </style>
</head>

<body>
  <div class="decor-top">✿ ✿ ✿ ✿ ✿</div>
  <h1>TBR Wheel</h1>
  <div class="subtitle">A soft little book-fate machine</div>
  <div class="decor-bottom">✿ ✿ ✿ ✿ ✿</div>

  <div class="controls">
    <input id="bookInput" placeholder="Enter book name" />
    <button onclick="addBook()">Add</button>
    <button onclick="clearBooks()">Clear All</button>
  </div>

  <div class="wheel-wrap">
    <div class="pointer"></div>
    <canvas id="wheelCanvas"></canvas>
  </div>

  <br>
  <button onclick="spinWheel()">Spin</button>

  <h2 id="result"></h2>

  <div class="history">
    <h3>Winner History</h3>
    <ol id="historyList" class="history-list"></ol>
  </div>

  <!-- Winner popup -->
  <div id="winnerModal" class="modal-overlay" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <h2>Winner</h2>
      <div id="winnerText" class="winner-book"></div>
      <button onclick="hideWinnerModal()">Close</button>
    </div>
  </div>

<script>
let books = JSON.parse(localStorage.getItem("books")) || [];
let history = JSON.parse(localStorage.getItem("history")) || [];
let wheel = null;
let isSpinning = false;
let resultShown = false;

const pastelColors = [
  "#ffd6e7",
  "#f3c4fb",
  "#e7c6ff",
  "#d8bbff",
  "#cdb4db",
  "#ffc8dd",
  "#f1d4e5",
  "#e0aaff"
];

function saveBooks() {
  localStorage.setItem("books", JSON.stringify(books));
}

function saveHistory() {
  localStorage.setItem("history", JSON.stringify(history));
}

function getWheelSize() {
  const maxSize = 360;
  const minSize = 240;
  const target = Math.floor(Math.min(window.innerWidth * 0.82, maxSize));
  return Math.max(minSize, target);
}

function resizeCanvas() {
  const canvas = document.getElementById("wheelCanvas");
  const size = getWheelSize();
  canvas.width = size;
  canvas.height = size;
  canvas.style.width = size + "px";
  canvas.style.height = size + "px";
}

function wrapText(text, maxChars = 12) {
  const words = text.trim().split(/\s+/);
  const lines = [];
  let currentLine = "";

  for (const word of words) {
    if (word.length > maxChars) {
      if (currentLine) {
        lines.push(currentLine);
        currentLine = "";
      }
      for (let i = 0; i < word.length; i += maxChars) {
        lines.push(word.slice(i, i + maxChars));
      }
      continue;
    }

    const testLine = currentLine ? currentLine + " " + word : word;

    if (testLine.length <= maxChars) {
      currentLine = testLine;
    } else {
      if (currentLine) lines.push(currentLine);
      currentLine = word;
    }
  }

  if (currentLine) lines.push(currentLine);
  return lines.join("\n");
}

function getMaxCharsForLabel(label) {
  const len = label.length;
  if (len <= 18) return 12;
  if (len <= 28) return 10;
  if (len <= 40) return 8;
  return 6;
}

function getFontSizeForLabel(label) {
  const len = label.length;
  if (len <= 18) return 16;
  if (len <= 28) return 14;
  if (len <= 40) return 12;
  return 10;
}

function addBook() {
  const input = document.getElementById("bookInput");
  const value = input.value.trim();

  if (value !== "") {
    books.push(value);
    input.value = "";
    saveBooks();
    drawWheel();
  }
}

function clearBooks() {
  books = [];
  saveBooks();
  drawWheel();
  document.getElementById("result").innerText = "";
  hideWinnerModal();
}

function drawWheel() {
  resizeCanvas();

  wheel = new Winwheel({
    canvasId: "wheelCanvas",
    numSegments: books.length || 1,
    outerRadius: getWheelSize() / 2 - 5,
    segments: books.length
      ? books.map((book, i) => {
          const maxChars = getMaxCharsForLabel(book);
          const fontSize = getFontSizeForLabel(book);

          return {
            text: wrapText(book, maxChars),
            originalText: book,
            fillStyle: pastelColors[i % pastelColors.length],
            textFillStyle: "#5f4a57",
            textFontFamily: "Inter",
            textFontSize: fontSize,
            textOrientation: "horizontal",
            textAlignment: "center",
            textDirection: "normal",
            textMargin: 10
          };
        })
      : [{
          text: "Add books",
          fillStyle: "#f8edeb",
          textFillStyle: "#5f4a57",
          textFontFamily: "Inter",
          textFontSize: 16
        }],
    animation: {
      type: "spinToStop",
      duration: 4,
      spins: 6,
      callbackFinished: "showResult()"
    }
  });

  wheel.draw();
}

function spinWheel() {
  if (books.length === 0) {
    alert("Add some books first!");
    return;
  }

  if (isSpinning) return;
  isSpinning = true;
  resultShown = false;

  document.getElementById("result").innerText = "";
  hideWinnerModal();

  wheel.startAnimation();

  setTimeout(() => {
    if (isSpinning && !resultShown) {
      showResult();
    }
  }, 4200);
}

function showResult() {
  if (resultShown) return;
  resultShown = true;
  isSpinning = false;

  const segment = wheel.getIndicatedSegment();
  if (!segment) return;

  const winner = segment.originalText || segment.text.replace(/\n/g, " ");

  document.getElementById("result").innerText = "You got: " + winner;
  document.getElementById("winnerText").innerText = winner;
  document.getElementById("winnerModal").style.display = "flex";

  history.unshift(winner);
  saveHistory();
  renderHistory();

  books = books.filter(b => b !== winner);
  saveBooks();
  drawWheel();

  launchSparkles(28);
}

function renderHistory() {
  const list = document.getElementById("historyList");
  list.innerHTML = "";

  if (history.length === 0) {
    const li = document.createElement("li");
    li.textContent = "No winners yet.";
    list.appendChild(li);
    return;
  }

  history.slice(0, 20).forEach(item => {
    const li = document.createElement("li");
    li.textContent = item;
    list.appendChild(li);
  });
}

function hideWinnerModal() {
  document.getElementById("winnerModal").style.display = "none";
}

function closeModal(event) {
  if (event.target.id === "winnerModal") {
    hideWinnerModal();
  }
}

function launchSparkles(count = 20) {
  const modal = document.getElementById("winnerModal");
  const rect = modal.getBoundingClientRect();

  for (let i = 0; i < count; i++) {
    const sparkle = document.createElement("div");
    sparkle.className = "sparkle";

    const size = 6 + Math.random() * 10;
    sparkle.style.width = size + "px";
    sparkle.style.height = size + "px";

    const startX = rect.left + rect.width / 2 + (Math.random() * 180 - 90);
    const startY = rect.top + rect.height / 2 + (Math.random() * 120 - 60);

    sparkle.style.left = startX + "px";
    sparkle.style.top = startY + "px";
    sparkle.style.setProperty("--dx", (Math.random() * 220 - 110) + "px");
    sparkle.style.setProperty("--dy", (Math.random() * 220 - 140) + "px");

    document.body.appendChild(sparkle);

    setTimeout(() => sparkle.remove(), 950);
  }
}

function createPetals() {
  const petals = ["✿", "❀", "✾"];
  const count = 18;

  for (let i = 0; i < count; i++) {
    const petal = document.createElement("div");
    petal.className = "petal";
    petal.textContent = petals[Math.floor(Math.random() * petals.length)];
    petal.style.left = Math.random() * 100 + "vw";
    petal.style.top = (-10 - Math.random() * 90) + "vh";
    petal.style.animationDuration = (10 + Math.random() * 10) + "s";
    petal.style.animationDelay = (Math.random() * 8) + "s";
    petal.style.fontSize = (14 + Math.random() * 14) + "px";
    document.body.appendChild(petal);
  }
}

window.addEventListener("resize", () => {
  drawWheel();
});

renderHistory();
drawWheel();
createPetals();
</script>
</body>
</html>
