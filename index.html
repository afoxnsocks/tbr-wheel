<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TBR Wheel</title>

  <!-- Wheel + animation libraries -->
  <script src="Winwheel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <style>
    :root {
      --pink: #ff8fab;
      --pink-dark: #fb6f92;
      --text: #5a4a4a;
      --purple: #7b2cbf;
      --panel: rgba(255, 255, 255, 0.82);
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Trebuchet MS', sans-serif;
      text-align: center;
      color: var(--text);
      min-height: 100vh;
      margin: 0;
      padding: 20px 16px 40px;
      background:
        linear-gradient(rgba(255, 240, 246, 0.75), rgba(255, 240, 246, 0.75)),
        url("background.png") no-repeat center center fixed;
      background-size: cover;
    }

    h1 {
      font-family: Georgia, serif;
      margin: 8px 0 16px;
      color: #6d3b6f;
      text-shadow: 0 1px 0 rgba(255,255,255,0.7);
      font-size: clamp(2rem, 5vw, 3rem);
    }

    .controls {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    input {
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #ffc2d1;
      width: min(420px, 86vw);
      outline: none;
      background: rgba(255, 255, 255, 0.88);
      font-size: 16px;
    }

    button {
      padding: 12px 16px;
      border-radius: 12px;
      border: none;
      background: var(--pink);
      color: white;
      cursor: pointer;
      transition: 0.2s ease;
      box-shadow: 0 6px 14px rgba(255, 143, 171, 0.25);
      font-size: 16px;
      min-height: 44px;
    }

    button:hover {
      background: var(--pink-dark);
      transform: translateY(-1px);
    }

    .wheel-wrap {
      position: relative;
      display: inline-block;
      margin-top: 10px;
      padding-top: 22px;
    }

    .pointer {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 16px solid transparent;
      border-right: 16px solid transparent;
      border-bottom: 26px solid #7b2cbf;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.18));
      z-index: 5;
    }

    canvas {
      display: block;
      margin: 0 auto;
      border-radius: 50%;
      box-shadow:
        0 0 18px rgba(255, 182, 193, 0.55),
        0 0 40px rgba(177, 156, 255, 0.28);
      background: rgba(255, 255, 255, 0.16);
      touch-action: manipulation;
      max-width: 90vw;
      height: auto;
    }

    #result {
      margin-top: 18px;
      color: #7b2cbf;
      font-size: 1.2rem;
      font-weight: bold;
      text-shadow: 0 1px 0 rgba(255,255,255,0.5);
      min-height: 1.4em;
    }

    .history {
      width: min(520px, 92vw);
      margin: 24px auto 0;
      padding: 16px;
      border-radius: 18px;
      background: var(--panel);
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      text-align: left;
    }

    .history h3 {
      margin: 0 0 10px;
      color: #6d3b6f;
    }

    .history-list {
      margin: 0;
      padding-left: 20px;
      max-height: 160px;
      overflow: auto;
    }

    .history-list li {
      margin: 6px 0;
      word-break: break-word;
    }

    /* Winner popup */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(90, 74, 74, 0.5);
      align-items: center;
      justify-content: center;
      z-index: 999999;
      padding: 20px;
    }

    .modal {
      background: rgba(255, 255, 255, 0.96);
      border-radius: 22px;
      padding: 28px 24px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.22);
      border: 2px solid #f7d6e0;
      backdrop-filter: blur(6px);
    }

    .modal h2 {
      margin-top: 0;
      color: #8a4fff;
    }

    .winner-book {
      font-size: 1.4rem;
      font-weight: bold;
      margin: 12px 0 18px;
      color: #7b2cbf;
      word-break: break-word;
    }

    .modal button {
      background: linear-gradient(135deg, #ff8fab, #bdb2ff);
    }

    .modal button:hover {
      background: linear-gradient(135deg, #fb6f92, #9d8cff);
    }

    /* Sparkles */
    .sparkle {
      position: fixed;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 1000000;
      background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,182,193,0.95) 35%, rgba(177,156,255,0.9) 70%, rgba(255,255,255,0) 100%);
      animation: sparkle-float 900ms ease-out forwards;
      filter: blur(0.2px);
    }

    @keyframes sparkle-float {
      0% {
        transform: translate(0, 0) scale(0.4);
        opacity: 1;
      }
      100% {
        transform: translate(var(--dx), var(--dy)) scale(1.4);
        opacity: 0;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 14px 10px 34px;
        background-attachment: scroll;
      }

      .controls {
        gap: 10px;
      }

      input {
        width: 100%;
        max-width: 520px;
      }

      button {
        width: auto;
      }

      .wheel-wrap {
        width: min(88vw, 340px);
      }

      canvas {
        width: min(88vw, 340px) !important;
        height: min(88vw, 340px) !important;
      }

      .history {
        text-align: left;
      }
    }
  </style>
</head>

<body>
  <h1>📚 TBR Wheel</h1>

  <div class="controls">
    <input id="bookInput" placeholder="Enter book name" />
    <button onclick="addBook()">Add</button>
    <button onclick="clearBooks()">Clear All</button>
  </div>

  <div class="wheel-wrap">
    <div class="pointer"></div>
    <canvas id="wheelCanvas"></canvas>
  </div>

  <br>
  <button onclick="spinWheel()">Spin 🎡</button>

  <h2 id="result"></h2>

  <div class="history">
    <h3>🏆 Winner History</h3>
    <ol id="historyList" class="history-list"></ol>
  </div>

  <!-- Winner popup -->
  <div id="winnerModal" class="modal-overlay" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <h2>🎉 Winner!</h2>
      <div id="winnerText" class="winner-book"></div>
      <button onclick="hideWinnerModal()">Close</button>
    </div>
  </div>

<script>
let books = JSON.parse(localStorage.getItem("books")) || [];
let history = JSON.parse(localStorage.getItem("history")) || [];
let wheel = null;
let isSpinning = false;
let resultShown = false;

const pastelColors = [
  "#ffd6e7",
  "#f3c4fb",
  "#e7c6ff",
  "#d8bbff",
  "#cdb4db",
  "#ffc8dd",
  "#f1d4e5",
  "#e0aaff"
];

function saveBooks() {
  localStorage.setItem("books", JSON.stringify(books));
}

function saveHistory() {
  localStorage.setItem("history", JSON.stringify(history));
}

function getWheelSize() {
  const maxSize = 360;
  const minSize = 240;
  const target = Math.floor(Math.min(window.innerWidth * 0.82, maxSize));
  return Math.max(minSize, target);
}

function resizeCanvas() {
  const canvas = document.getElementById("wheelCanvas");
  const size = getWheelSize();
  canvas.width = size;
  canvas.height = size;
  canvas.style.width = size + "px";
  canvas.style.height = size + "px";
}

function wrapText(text, maxChars = 12) {
  const words = text.trim().split(/\s+/);
  const lines = [];
  let currentLine = "";

  for (const word of words) {
    if (word.length > maxChars) {
      if (currentLine) {
        lines.push(currentLine);
        currentLine = "";
      }
      for (let i = 0; i < word.length; i += maxChars) {
        lines.push(word.slice(i, i + maxChars));
      }
      continue;
    }

    const testLine = currentLine ? currentLine + " " + word : word;

    if (testLine.length <= maxChars) {
      currentLine = testLine;
    } else {
      if (currentLine) lines.push(currentLine);
      currentLine = word;
    }
  }

  if (currentLine) lines.push(currentLine);
  return lines.join("\n");
}

function getMaxCharsForLabel(label) {
  const len = label.length;
  if (len <= 18) return 12;
  if (len <= 28) return 10;
  if (len <= 40) return 8;
  return 6;
}

function getFontSizeForLabel(label) {
  const len = label.length;
  if (len <= 18) return 16;
  if (len <= 28) return 14;
  if (len <= 40) return 12;
  return 10;
}

function addBook() {
  const input = document.getElementById("bookInput");
  const value = input.value.trim();

  if (value !== "") {
    books.push(value);
    input.value = "";
    saveBooks();
    drawWheel();
  }
}

function clearBooks() {
  books = [];
  saveBooks();
  drawWheel();
  document.getElementById("result").innerText = "";
  hideWinnerModal();
}

function drawWheel() {
  resizeCanvas();

  wheel = new Winwheel({
    canvasId: "wheelCanvas",
    numSegments: books.length || 1,
    outerRadius: getWheelSize() / 2 - 5,
    segments: books.length
      ? books.map((book, i) => {
          const maxChars = getMaxCharsForLabel(book);
          const fontSize = getFontSizeForLabel(book);

          return {
            text: wrapText(book, maxChars),
            originalText: book,
            fillStyle: pastelColors[i % pastelColors.length],
            textFillStyle: "#5a4a4a",
            textFontFamily: "Trebuchet MS",
            textFontSize: fontSize,
            textOrientation: "horizontal",
            textAlignment: "center",
            textDirection: "normal",
            textMargin: 10
          };
        })
      : [{
          text: "Add books!",
          fillStyle: "#f8edeb",
          textFillStyle: "#5a4a4a",
          textFontFamily: "Trebuchet MS",
          textFontSize: 16
        }],
    animation: {
      type: "spinToStop",
      duration: 4,
      spins: 6,
      callbackFinished: "showResult()"
    }
  });

  wheel.draw();
}

function spinWheel() {
  if (books.length === 0) {
    alert("Add some books first!");
    return;
  }

  if (isSpinning) return;
  isSpinning = true;
  resultShown = false;

  document.getElementById("result").innerText = "";
  hideWinnerModal();

  wheel.startAnimation();

  // Backup in case the callback is flaky.
  setTimeout(() => {
    if (isSpinning && !resultShown) {
      showResult();
    }
  }, 4200);
}

function showResult() {
  if (resultShown) return;
  resultShown = true;
  isSpinning = false;

  const segment = wheel.getIndicatedSegment();
  if (!segment) return;

  const winner = segment.originalText || segment.text.replace(/\n/g, " ");

  document.getElementById("result").innerText = "You got: " + winner;
  document.getElementById("winnerText").innerText = winner;
  document.getElementById("winnerModal").style.display = "flex";

  history.unshift(winner);
  saveHistory();
  renderHistory();

  books = books.filter(b => b !== winner);
  saveBooks();
  drawWheel();

  launchSparkles(24);
}

function renderHistory() {
  const list = document.getElementById("historyList");
  list.innerHTML = "";

  if (history.length === 0) {
    const li = document.createElement("li");
    li.textContent = "No winners yet.";
    list.appendChild(li);
    return;
  }

  history.slice(0, 20).forEach(item => {
    const li = document.createElement("li");
    li.textContent = item;
    list.appendChild(li);
  });
}

function hideWinnerModal() {
  document.getElementById("winnerModal").style.display = "none";
}

function closeModal(event) {
  if (event.target.id === "winnerModal") {
    hideWinnerModal();
  }
}

function launchSparkles(count = 20) {
  const modal = document.getElementById("winnerModal");
  const rect = modal.getBoundingClientRect();

  for (let i = 0; i < count; i++) {
    const sparkle = document.createElement("div");
    sparkle.className = "sparkle";

    const size = 6 + Math.random() * 10;
    sparkle.style.width = size + "px";
    sparkle.style.height = size + "px";

    const startX = rect.left + rect.width / 2 + (Math.random() * 180 - 90);
    const startY = rect.top + rect.height / 2 + (Math.random() * 120 - 60);

    sparkle.style.left = startX + "px";
    sparkle.style.top = startY + "px";
    sparkle.style.setProperty("--dx", (Math.random() * 220 - 110) + "px");
    sparkle.style.setProperty("--dy", (Math.random() * 220 - 140) + "px");

    document.body.appendChild(sparkle);

    setTimeout(() => sparkle.remove(), 950);
  }
}

window.addEventListener("resize", () => {
  drawWheel();
});

renderHistory();
drawWheel();
</script>
</body>
</html>
