<!DOCTYPE html>
<html>
<head>
  <title>TBR Wheel</title>

  <!-- Wheel + animation libraries -->
  <script src="Winwheel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <style>
    body {
      font-family: 'Trebuchet MS', sans-serif;
      text-align: center;
      padding: 20px;
      color: #5a4a4a;
      min-height: 100vh;
      margin: 0;
      background:
        linear-gradient(rgba(255, 240, 246, 0.75), rgba(255, 240, 246, 0.75)),
        url("background.png") no-repeat center center fixed;
      background-size: cover;
    }

    h1 {
      font-family: Georgia, serif;
      margin-bottom: 10px;
      color: #6d3b6f;
      text-shadow: 0 1px 0 rgba(255,255,255,0.7);
    }

    input {
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ffc2d1;
      width: min(360px, 80vw);
      outline: none;
      background: rgba(255, 255, 255, 0.85);
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border-radius: 12px;
      border: none;
      background: #ff8fab;
      color: white;
      cursor: pointer;
      transition: 0.2s ease;
      box-shadow: 0 6px 14px rgba(255, 143, 171, 0.25);
    }

    button:hover {
      background: #fb6f92;
      transform: translateY(-1px);
    }

    canvas {
      margin-top: 20px;
      border-radius: 50%;
      box-shadow:
        0 0 18px rgba(255, 182, 193, 0.55),
        0 0 40px rgba(177, 156, 255, 0.28);
      background: rgba(255, 255, 255, 0.15);
    }

    #result {
      margin-top: 18px;
      color: #7b2cbf;
      font-size: 1.2rem;
      font-weight: bold;
      text-shadow: 0 1px 0 rgba(255,255,255,0.5);
    }

    /* Winner popup */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(90, 74, 74, 0.5);
      align-items: center;
      justify-content: center;
      z-index: 999999;
      padding: 20px;
    }

    .modal {
      background: rgba(255, 255, 255, 0.96);
      border-radius: 22px;
      padding: 28px 24px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.22);
      border: 2px solid #f7d6e0;
      backdrop-filter: blur(6px);
    }

    .modal h2 {
      margin-top: 0;
      color: #8a4fff;
    }

    .winner-book {
      font-size: 1.4rem;
      font-weight: bold;
      margin: 12px 0 18px;
      color: #7b2cbf;
      word-break: break-word;
    }

    .modal button {
      background: linear-gradient(135deg, #ff8fab, #bdb2ff);
    }

    .modal button:hover {
      background: linear-gradient(135deg, #fb6f92, #9d8cff);
    }
  </style>
</head>

<body>
  <h1>📚 TBR Wheel</h1>

  <input id="bookInput" placeholder="Enter book name" />
  <button onclick="addBook()">Add</button>
  <button onclick="clearBooks()">Clear All</button>

  <br><br>

  <canvas id="wheelCanvas" width="320" height="320"></canvas>

  <br>
  <button onclick="spinWheel()">Spin 🎡</button>

  <h2 id="result"></h2>

  <!-- Winner popup -->
  <div id="winnerModal" class="modal-overlay" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <h2>🎉 Winner!</h2>
      <div id="winnerText" class="winner-book"></div>
      <button onclick="hideWinnerModal()">Close</button>
    </div>
  </div>

<script>
let books = JSON.parse(localStorage.getItem("books")) || [];
let wheel = null;
let isSpinning = false;
let resultShown = false;

const pastelColors = [
  "#ffd6e7",
  "#f3c4fb",
  "#e7c6ff",
  "#d8bbff",
  "#cdb4db",
  "#ffc8dd",
  "#f1d4e5",
  "#e0aaff"
];

function saveBooks() {
  localStorage.setItem("books", JSON.stringify(books));
}

function wrapText(text, maxChars = 12) {
  const words = text.trim().split(/\s+/);
  const lines = [];
  let currentLine = "";

  for (const word of words) {
    if (word.length > maxChars) {
      if (currentLine) {
        lines.push(currentLine);
        currentLine = "";
      }
      for (let i = 0; i < word.length; i += maxChars) {
        lines.push(word.slice(i, i + maxChars));
      }
      continue;
    }

    const testLine = currentLine ? currentLine + " " + word : word;

    if (testLine.length <= maxChars) {
      currentLine = testLine;
    } else {
      if (currentLine) lines.push(currentLine);
      currentLine = word;
    }
  }

  if (currentLine) lines.push(currentLine);
  return lines.join("\n");
}

function getMaxCharsForLabel(label) {
  const len = label.length;
  if (len <= 18) return 12;
  if (len <= 28) return 10;
  if (len <= 40) return 8;
  return 6;
}

function getFontSizeForLabel(label) {
  const len = label.length;
  if (len <= 18) return 16;
  if (len <= 28) return 14;
  if (len <= 40) return 12;
  return 10;
}

function addBook() {
  const input = document.getElementById("bookInput");
  const value = input.value.trim();

  if (value !== "") {
    books.push(value);
    input.value = "";
    saveBooks();
    drawWheel();
  }
}

function clearBooks() {
  books = [];
  saveBooks();
  drawWheel();
  document.getElementById("result").innerText = "";
  hideWinnerModal();
}

function drawWheel() {
  wheel = new Winwheel({
    canvasId: "wheelCanvas",
    numSegments: books.length || 1,
    outerRadius: 150,
    segments: books.length
      ? books.map((book, i) => {
          const maxChars = getMaxCharsForLabel(book);
          const fontSize = getFontSizeForLabel(book);

          return {
            text: wrapText(book, maxChars),
            originalText: book,
            fillStyle: pastelColors[i % pastelColors.length],
            textFillStyle: "#5a4a4a",
            textFontFamily: "Trebuchet MS",
            textFontSize: fontSize,
            textOrientation: "horizontal",
            textAlignment: "center",
            textDirection: "normal",
            textMargin: 10
          };
        })
      : [{
          text: "Add books!",
          fillStyle: "#f8edeb",
          textFillStyle: "#5a4a4a",
          textFontFamily: "Trebuchet MS",
          textFontSize: 16
        }],
    animation: {
      type: "spinToStop",
      duration: 4,
      spins: 6,
      callbackFinished: "showResult()"
    }
  });

  wheel.draw();
}

function spinWheel() {
  if (books.length === 0) {
    alert("Add some books first!");
    return;
  }

  if (isSpinning) return;
  isSpinning = true;
  resultShown = false;

  document.getElementById("result").innerText = "";
  hideWinnerModal();

  wheel.startAnimation();

  // Backup in case the Winwheel callback doesn't fire in this browser/version
  setTimeout(() => {
    if (isSpinning && !resultShown) {
      showResult();
    }
  }, 4200);
}

function showResult() {
  if (resultShown) return;
  resultShown = true;
  isSpinning = false;

  const segment = wheel.getIndicatedSegment();
  if (!segment) return;

  const winner = segment.originalText || segment.text.replace(/\n/g, " ");

  document.getElementById("result").innerText = "You got: " + winner;
  document.getElementById("winnerText").innerText = winner;
  document.getElementById("winnerModal").style.display = "flex";

  books = books.filter(b => b !== winner);
  saveBooks();
  drawWheel();
}

function hideWinnerModal() {
  document.getElementById("winnerModal").style.display = "none";
}

function closeModal(event) {
  if (event.target.id === "winnerModal") {
    hideWinnerModal();
  }
}

drawWheel();
</script>
